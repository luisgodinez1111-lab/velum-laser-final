openapi: 3.1.0
info:
  title: VELUM API v1
  version: 1.3.0
servers:
  - url: /api
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: velum_token
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    Notification:
      type: object
      properties:
        id:        { type: string }
        type:      { type: string, description: Tipo de notificación }
        title:     { type: string }
        body:      { type: string, nullable: true }
        read:      { type: boolean }
        createdAt: { type: string, format: date-time }
    LeadCreate:
      type: object
      required: [name, email, phone, consent]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        consent: { type: boolean, enum: [true] }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_campaign: { type: string }
        utm_term: { type: string }
        utm_content: { type: string }
        fbp: { type: string }
        fbc: { type: string }
        fbclid: { type: string }
paths:
  /me:
    get:
      summary: Ruta legacy de sesión actual
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
  /users/me:
    get:
      summary: Alias de /me
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
  /v1/leads:
    post:
      summary: Crear lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadCreate'
      responses:
        '201':
          description: Lead creado
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/medical-intakes/me:
    get:
      summary: Obtener expediente médico propio
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
    put:
      summary: Guardar expediente médico propio
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Actualizado
  /v1/medical-intakes/{userId}/approve:
    post:
      summary: Aprobar/rechazar expediente (staff/admin/system)
      security: [{ cookieAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Aprobado/rechazado }
        '403': { description: Forbidden }
  /v1/appointments:
    get:
      summary: Listar citas
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Crear cita
      security: [{ cookieAuth: [] }]
      responses:
        '201': { description: Creada }
  /v1/appointments/{appointmentId}:
    patch:
      summary: Reprogramar o cancelar cita
      security: [{ cookieAuth: [] }]
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Actualizada }
  /v1/sessions:
    post:
      summary: Registrar sesión clínica
      security: [{ cookieAuth: [] }]
      responses:
        '201': { description: Sesión creada }
  /v1/sessions/{sessionId}/feedback:
    patch:
      summary: Guardar feedback de sesión
      security: [{ cookieAuth: [] }]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Actualizada }
  /v1/payments/me:
    get:
      summary: Historial de pagos del usuario
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /v1/payments:
    get:
      summary: Historial de pagos operativo (staff/admin/system)
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /v1/audit-logs:
    get:
      summary: Audit logs filtrables (admin/system)
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /v1/marketing/events:
    post:
      summary: Registrar evento para Meta CAPI
      responses:
        '202': { description: Accepted }
    get:
      summary: Monitorear estado de envíos CAPI
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /admin/marketing/events:
    get:
      summary: Alias admin para monitoreo de envíos CAPI
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }

  # ── Billing ────────────────────────────────────────────────────────────
  /v1/billing/checkout:
    post:
      summary: Crear sesión de checkout en Stripe
      description: Crea una sesión de Stripe Checkout para suscribirse a un plan. El planCode debe estar configurado en Admin → Stripe → Planes.
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planCode]
              properties:
                planCode:
                  type: string
                  example: essential
      responses:
        '200':
          description: URL de checkout generada
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutUrl: { type: string }
                  sessionId: { type: string }
                  planCode: { type: string }
        '400': { description: planCode faltante o Stripe no configurado }
        '404': { description: Plan no encontrado o inactivo }
        '502': { description: Error en API de Stripe }
  /v1/billing/portal:
    post:
      summary: Abrir portal de facturación de Stripe (cancelar/cambiar plan)
      description: Redirige al usuario al Stripe Customer Portal. Requiere que el usuario tenga un stripeCustomerId (se asigna al completar el primer checkout).
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: URL del portal
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
        '400': { description: Sin suscripción activa o Stripe no configurado }
        '502': { description: Error en API de Stripe }

  # ── Admin — Stripe Config ───────────────────────────────────────────────
  /v1/admin/integrations/stripe:
    get:
      summary: Obtener configuración de Stripe (admin)
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Configuración actual (keys enmascaradas)
        '403': { description: No autorizado }
    put:
      summary: Guardar configuración de Stripe (admin)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                secretKey: { type: string }
                publishableKey: { type: string }
                webhookSecret: { type: string }
      responses:
        '200': { description: Configuración guardada }
        '403': { description: No autorizado }
  /v1/admin/integrations/stripe/test:
    post:
      summary: Probar conexión con Stripe (admin)
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Conexión exitosa }
        '400': { description: Error de conexión }
  /v1/admin/integrations/stripe/plans:
    get:
      summary: Obtener catálogo de planes Stripe (admin)
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Lista de planes configurados
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        planCode: { type: string }
                        name: { type: string }
                        amount: { type: number }
                        interval: { type: string, enum: [day, week, month, year] }
                        stripePriceId: { type: string }
                        active: { type: boolean }
    put:
      summary: Guardar catálogo de planes Stripe (admin)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plans:
                  type: array
                  items:
                    type: object
      responses:
        '200': { description: Planes guardados }
        '403': { description: No autorizado }

  # ── Admin — WhatsApp Config ─────────────────────────────────────────────
  /v1/admin/integrations/whatsapp:
    get:
      summary: Obtener configuración de WhatsApp/Meta (admin)
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Configuración actual }
        '403': { description: No autorizado }
    put:
      summary: Guardar configuración de WhatsApp/Meta (admin)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken: { type: string }
                phoneNumberId: { type: string }
                businessAccountId: { type: string }
                webhookVerifyToken: { type: string }
      responses:
        '200': { description: Configuración guardada }

  # ── Admin — Acceso y Usuarios ───────────────────────────────────────────
  /v1/admin/access/users:
    get:
      summary: Listar usuarios con roles y permisos (admin)
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        email: { type: string }
                        role: { type: string }
                        kind: { type: string }
                        permissions: { type: array, items: { type: string } }
        '403': { description: No autorizado }
    post:
      summary: Crear usuario administrativo (admin)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                role: { type: string, enum: [admin, staff, member] }
      responses:
        '201': { description: Usuario creado }
        '400': { description: Datos inválidos o email duplicado }
        '403': { description: No autorizado }
  /v1/admin/access/users/{userId}:
    patch:
      summary: Cambiar rol o permisos de un usuario (admin)
      security: [{ cookieAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
                permissions: { type: array, items: { type: string } }
      responses:
        '200': { description: Actualizado }
        '403': { description: No autorizado }
  /v1/admin/access/users/{userId}/reset-password:
    post:
      summary: Resetear contraseña de un usuario (admin)
      security: [{ cookieAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword: { type: string }
      responses:
        '200': { description: Contraseña actualizada }
        '403': { description: No autorizado }

  # ── Member Self-Service ─────────────────────────────────────────────────
  /v1/users/me/profile:
    get:
      summary: Obtener perfil propio
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Perfil del usuario }
    put:
      summary: Actualizar perfil propio (nombre, teléfono)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                phone: { type: string }
      responses:
        '200': { description: Perfil actualizado }
  /v1/users/me/password/request-whatsapp-code:
    post:
      summary: Solicitar código OTP por WhatsApp para cambio de contraseña
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Código enviado }
        '400': { description: Teléfono no registrado o WhatsApp no configurado }
  /v1/users/me/password:
    post:
      summary: Cambiar contraseña con código OTP de WhatsApp
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, newPassword]
              properties:
                code: { type: string, description: Código OTP de 6 dígitos }
                newPassword: { type: string }
      responses:
        '200': { description: Contraseña actualizada }
        '400': { description: Código inválido o expirado }

  # ── Notificaciones ──────────────────────────────────────────────────────
  /v1/notifications:
    get:
      summary: Listar notificaciones del usuario autenticado
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
        - { name: skip,  in: query, schema: { type: integer, default: 0  } }
      responses:
        '200':
          description: Lista de notificaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Notification' } }
                  total: { type: integer }
                  unread: { type: integer }
        '401': { description: No autenticado }

  /v1/notifications/unread-count:
    get:
      summary: Conteo de notificaciones no leídas
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Conteo
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
        '401': { description: No autenticado }

  /v1/notifications/stream:
    get:
      summary: Stream de notificaciones en tiempo real (Server-Sent Events)
      description: Abre una conexión SSE persistente. El servidor emite un evento `data` por cada notificación nueva. Emite comentarios de heartbeat cada 25 segundos para mantener la conexión viva.
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: Stream text/event-stream activo
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"id\":\"notif_1\",\"type\":\"new_member\",\"title\":\"Nueva socia\"}\n\n"
        '401': { description: No autenticado }

  /v1/notifications/read-all:
    post:
      summary: Marcar todas las notificaciones como leídas
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Todas marcadas como leídas }
        '401': { description: No autenticado }

  /v1/notifications/{id}/read:
    post:
      summary: Marcar una notificación como leída
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Notificación marcada como leída }
        '401': { description: No autenticado }
        '404': { description: Notificación no encontrada }

  # ── Custom Charges (Admin) ───────────────────────────────────────────────────
  /v1/admin/custom-charges:
    get:
      summary: Listar cobros personalizados
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Lista de cobros }
        '401': { description: No autenticado }
    post:
      summary: Crear cobro personalizado con envío de OTP al cliente
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, title, amount, type]
              properties:
                userId:       { type: string }
                title:        { type: string }
                description:  { type: string }
                amount:       { type: integer, description: En centavos }
                currency:     { type: string, default: mxn }
                type:         { type: string, enum: [ONE_TIME, RECURRING] }
                interval:     { type: string, enum: [day, week, month, year, once] }
                expiresInHours: { type: integer, default: 72 }
      responses:
        '201': { description: Cobro creado y OTP enviado }
        '400': { description: Datos inválidos }
        '401': { description: No autenticado }

  /v1/admin/custom-charges/{id}:
    delete:
      summary: Cancelar cobro personalizado
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Cobro cancelado }
        '401': { description: No autenticado }
        '404': { description: Cobro no encontrado }

  /v1/admin/custom-charges/{id}/resend:
    post:
      summary: Reenviar OTP del cobro personalizado al cliente
      description: Rate limited — máximo 3 solicitudes por IP cada 15 minutos.
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OTP reenviado }
        '400': { description: Cobro no en estado válido para reenvío }
        '429': { description: Demasiadas solicitudes de OTP }

  # ── Custom Charges (Público) ─────────────────────────────────────────────────
  /v1/custom-charges/{id}:
    get:
      summary: Obtener detalle público de un cobro (sin autenticación)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Detalle del cobro }
        '404': { description: Cobro no encontrado }

  /v1/custom-charges/{id}/verify:
    post:
      summary: Verificar OTP y obtener URL de checkout Stripe
      description: Endpoint público. Rate limited — máximo 15 req/10 min por IP.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp: { type: string, pattern: '^[A-Z0-9]{6}$', description: 6 caracteres alfanuméricos }
      responses:
        '200':
          description: OTP válido — URL de checkout generada
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutUrl: { type: string, format: uri }
                  sessionId:   { type: string }
        '400': { description: OTP inválido, expirado o cobro en estado incorrecto }
        '404': { description: Cobro no encontrado }
        '502': { description: Error al crear sesión en Stripe }

  # ── Admin Access (endpoints adicionales) ────────────────────────────────────
  /v1/admin/access/users/{userId}/deactivate:
    patch:
      summary: Desactivar usuario
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Usuario desactivado }
        '401': { description: No autenticado }
        '404': { description: Usuario no encontrado }

  /v1/admin/access/users/{userId}/activate:
    patch:
      summary: Reactivar usuario
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Usuario reactivado }
        '401': { description: No autenticado }

  /v1/admin/access/users/{userId}/request-delete-otp:
    post:
      summary: Solicitar OTP para confirmar eliminación de usuario
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OTP enviado al administrador }
        '401': { description: No autenticado }

  /v1/admin/access/users/{userId}/delete:
    delete:
      summary: Eliminar usuario permanentemente (requiere OTP)
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp: { type: string }
      responses:
        '200': { description: Usuario eliminado }
        '400': { description: OTP inválido }
        '401': { description: No autenticado }

  # ── Agenda (pública) ─────────────────────────────────────────────────────────
  /v1/agenda/public/policy:
    get:
      summary: Política de agenda pública (horarios, slots, restricciones)
      responses:
        '200': { description: Política de agenda }

  /v1/agenda/public/slots/{dateKey}:
    get:
      summary: Slots disponibles para una fecha
      parameters:
        - { name: dateKey, in: path, required: true, schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }, example: '2026-04-15' }
        - { name: treatmentId, in: query, schema: { type: string } }
        - { name: cabinId, in: query, schema: { type: string } }
      responses:
        '200': { description: Lista de slots disponibles con startAt/endAt }

  # ── Agenda (admin) ───────────────────────────────────────────────────────────
  /v1/agenda/admin/config:
    get:
      summary: Obtener configuración completa de agenda
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Política, cabinas, tratamientos y reglas semanales }
    put:
      summary: Actualizar configuración de agenda
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Configuración actualizada }

  /v1/agenda/admin/day/{dateKey}:
    get:
      summary: Vista de día para administración de agenda
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: dateKey, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Citas y bloques del día }

  /v1/agenda/admin/blocks:
    post:
      summary: Crear bloqueo de slot o período
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startAt, endAt]
              properties:
                startAt: { type: string, format: date-time }
                endAt:   { type: string, format: date-time }
                reason:  { type: string }
                cabinId: { type: string }
      responses:
        '201': { description: Bloqueo creado }

  /v1/agenda/admin/blocks/{blockId}:
    delete:
      summary: Eliminar bloqueo de agenda
      security: [{ cookieAuth: [] }]
      parameters:
        - { name: blockId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Bloqueo eliminado }

  # ── Google Calendar Integration ──────────────────────────────────────────────
  /integrations/google-calendar/status:
    get:
      summary: Estado de la integración con Google Calendar
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Estado de la integración y configuración }

  /integrations/google-calendar/connect:
    post:
      summary: Iniciar flujo OAuth para conectar Google Calendar
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: URL de autorización OAuth
          content:
            application/json:
              schema:
                type: object
                properties:
                  authUrl: { type: string, format: uri }

  /integrations/google-calendar/callback:
    get:
      summary: Callback OAuth de Google Calendar
      parameters:
        - { name: code,  in: query, required: true,  schema: { type: string } }
        - { name: state, in: query, required: false, schema: { type: string } }
      responses:
        '302': { description: Redirección al frontend tras autenticación exitosa }

  /integrations/google-calendar/disconnect:
    post:
      summary: Desconectar integración de Google Calendar
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: Integración desconectada }

  /integrations/google-calendar/settings:
    patch:
      summary: Actualizar configuración de sincronización con Google Calendar
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                syncEnabled: { type: boolean }
                calendarId:  { type: string }
      responses:
        '200': { description: Configuración actualizada }

  # ── Google Calendar Webhook ──────────────────────────────────────────────────
  /webhooks/google-calendar:
    post:
      summary: Webhook de notificaciones push de Google Calendar
      description: Recibe notificaciones de cambios en eventos del calendario sincronizado. Validado por X-Goog-Channel-Token.
      responses:
        '200': { description: Notificación recibida y procesada }
        '403': { description: Token inválido }

  # ── Stripe Webhook ──────────────────────────────────────────────────────
  /v1/stripe/webhook:
    post:
      summary: Endpoint de webhooks de Stripe
      description: Recibe eventos de Stripe (checkout.session.completed, invoice.payment_succeeded, etc.). Requiere header stripe-signature y body raw.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Evento procesado }
        '400': { description: Firma inválida }
        '500': { description: Error procesando evento }
