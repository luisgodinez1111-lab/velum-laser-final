server {
  listen 80;
  listen [::]:80;
  server_name velumlaser.com www.velumlaser.com;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name velumlaser.com www.velumlaser.com;

  ssl_certificate     /etc/letsencrypt/live/velumlaser.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/velumlaser.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── Security headers ────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # 'unsafe-inline' eliminado de script-src. Importmaps externos eliminados.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://velumlaser.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

  # Tamaño máximo de request — cubre uploads de firma (3MB base64 + overhead)
  client_max_body_size 10m;

  root /usr/share/nginx/html;
  index index.html;

  # SSE — sin buffering y timeout extendido para conexiones de larga duración
  location = /api/v1/notifications/stream {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    keepalive_timeout 3600s;
  }

  # v1 API (ya viene con /api/v1 en backend)
  location /api/v1/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Legacy endpoints llamados desde frontend como /api/*
  # /api/auth/login -> /auth/login
  # /api/users/me   -> /users/me
  # /api/admin/*    -> /admin/*
  # /api/me         -> /me
  location ~ ^/api/(auth|users|admin|membership|documents|me)(/.*)?$ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Otros /api (ej. /api/health)
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Webhook/documentación
  location /stripe/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    # Swagger UI — restricted to localhost / VPN only in production
    allow 127.0.0.1;
    deny all;
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hashed assets — cache 1 año (el hash cambia si el contenido cambia)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # nginx no hereda add_header del bloque server cuando el location tiene sus propios add_header.
  # Se repiten aquí los headers de seguridad para que /index.html los reciba siempre.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://velumlaser.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;
    expires -1;
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
