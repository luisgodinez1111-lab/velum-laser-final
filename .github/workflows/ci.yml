name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        # pgvector/pgvector en vez de postgres:16-alpine — la migración
        # 20260427005000 hace CREATE EXTENSION vector, que la imagen vanilla no trae.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: velum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/velum_test
      # El schema define directUrl=env("DIRECT_URL") para migraciones; en CI
      # apuntamos al mismo Postgres local (como hace start.sh: DIRECT_URL:-$DATABASE_URL).
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/velum_test
      JWT_SECRET: test-secret-with-at-least-32-characters-here
      INTEGRATIONS_ENC_KEY: test-enc-key-with-at-least-32-characters
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps: server tiene eslint@9 con @typescript-eslint@7 (pide
        # eslint@8) — mismo patrón que los jobs frontend/E2E. Sin esto npm ci falla
        # con ERESOLVE y el job Backend nunca validaba (tsc/tests no corrían).
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root + server, server provee tsx para codegen)
        run: |
          npm ci --legacy-peer-deps
          (cd server && npm ci --legacy-peer-deps --ignore-scripts)

      - name: API types up-to-date with openapi.ts
        run: npm run codegen:check

      - name: Lint (rules-of-hooks)
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Bundle size budget
        run: npx size-limit

      - name: Storybook build (smoke test)
        run: npx storybook build -o storybook-static --quiet

  # ── E2E (Playwright) ─────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright — flujos de frontend, backend mockeado)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
