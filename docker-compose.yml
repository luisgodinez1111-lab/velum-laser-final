services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    # Puerto 4000 NO expuesto — nginx accede vía red Docker interna (http://api:4000)
    # Exponer este puerto permitiría bypassear nginx, TLS y rate limiting
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/velum/uploads:/var/velum/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    # Mismo image que el API (comparten src/utils, prisma client, etc).
    # Solo cambia el comando: arranca el outbox dispatcher en lugar del HTTP server.
    build:
      context: ./server
    image: velum-laser-final-api  # reusar la imagen ya construida por `api`
    command: ["./node_modules/.bin/tsx", "src/worker.ts"]
    env_file:
      - ./server/.env
    environment:
      OUTBOX_HEALTH_PORT: "4100"  # health endpoint local para healthcheck
    depends_on:
      api:
        condition: service_healthy   # asume que las migrations ya corrieron en el API
    volumes:
      - /var/velum/uploads:/var/velum/uploads:ro   # solo lectura — workers no escriben uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m              # menor que API (no sirve HTTP, sin Express)
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 10s para drain del batch en curso antes de SIGKILL.
    stop_grace_period: 15s

  postgres:
    # pgvector/pgvector:pg16 — drop-in replacement de postgres:16-alpine que
    # incluye la extensión `vector`. Requerido para RAG sobre MedicalIntake
    # (Movimiento #8). El data volume es compatible: Postgres 16 mismo schema.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # Sin fallback — falla el arranque si no está definida
      POSTGRES_DB: velum
    ports:
      - "127.0.0.1:5432:5432"   # Solo acceso local para backups y debugging — nunca exponer en 0.0.0.0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Analytics self-hosted ──────────────────────────────────────────────
  # Umami v2 — privacy-friendly, GDPR-compliant. Vive bajo /stats vía nginx
  # proxy (path-based hosting nativo gracias a BASE_PATH). Reusa el Postgres
  # existente con su propia database 'umami' aislada.
  #
  # Setup inicial (UNA vez, antes del primer arranque):
  #   docker compose exec postgres psql -U postgres -c "CREATE DATABASE umami;"
  #
  # Variables requeridas en server/.env (o .env raíz si lo prefieres):
  #   UMAMI_APP_SECRET — string aleatorio de 64+ chars (openssl rand -hex 64)
  #   UMAMI_DATABASE_URL — postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/umami
  #
  # Login admin inicial: usuario 'admin' / password 'umami'. Cambiar en primer login.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.13.0
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      BASE_PATH: /stats
      HOSTNAME: 0.0.0.0
      DISABLE_TELEMETRY: "1"   # No enviar telemetría a Umami software
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/stats/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      umami:
        condition: service_started
    volumes:
      - /var/velum/uploads:/var/velum/uploads:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    # Workers de nginx corren como usuario 'nginx' (non-root).
    # El proceso master necesita root solo para bind :80/:443 y leer certs TLS.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
