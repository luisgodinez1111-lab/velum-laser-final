services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    # Puerto 4000 NO expuesto — nginx accede vía red Docker interna (http://api:4000)
    # Exponer este puerto permitiría bypassear nginx, TLS y rate limiting
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/velum/uploads:/var/velum/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # Sin fallback — falla el arranque si no está definida
      POSTGRES_DB: velum
    ports:
      - "127.0.0.1:5432:5432"   # Solo acceso local para backups y debugging — nunca exponer en 0.0.0.0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - /var/velum/uploads:/var/velum/uploads:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    # Workers de nginx corren como usuario 'nginx' (non-root).
    # El proceso master necesita root solo para bind :80/:443 y leer certs TLS.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
